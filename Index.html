<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राजस्थान गणित प्रश्न बैंक</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800;900&display=swap');

  :root {
    --saffron: #FF6B00;
    --deep-maroon: #7B1C1C;
    --cream: #FFF8EE;
    --gold: #D4A017;
    --light-gold: #FFF0C8;
    --green: #1A7A4A;
    --red: #C0392B;
    --text: #1A1A1A;
    --card-bg: #FFFFFF;
    --border: #E8D5B7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Devanagari', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 18px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--deep-maroon) 0%, #A93226 50%, var(--saffron) 100%);
    padding: 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  header h1 {
    font-size: 2rem;
    font-weight: 900;
    color: #FFE97A;
    letter-spacing: 1px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }

  header p {
    color: #FDDCAA;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 4px;
  }

  .scorebar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .score-badge {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 30px;
    padding: 6px 18px;
    color: white;
    font-weight: 800;
    font-size: 1rem;
  }

  .score-badge span { font-size: 1.3rem; color: #FFE97A; }

  /* FILTER BAR */
  .filter-bar {
    background: white;
    border-bottom: 3px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .filter-bar label {
    font-weight: 700;
    font-size: 1rem;
    color: var(--deep-maroon);
  }

  .filter-bar select, .filter-bar input {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    color: var(--text);
    cursor: pointer;
  }

  .filter-bar select:focus, .filter-bar input:focus {
    outline: none;
    border-color: var(--saffron);
  }

  .btn-reset {
    background: var(--deep-maroon);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: var(--saffron); }

  /* PROGRESS */
  .progress-section {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 16px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 1rem;
    color: var(--deep-maroon);
    margin-bottom: 6px;
  }

  .progress-bar-outer {
    height: 14px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--saffron), var(--gold));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .questions-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  .q-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 26px;
    margin-bottom: 24px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    transition: box-shadow 0.2s;
  }

  .q-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .q-number {
    background: var(--deep-maroon);
    color: white;
    font-size: 1rem;
    font-weight: 900;
    padding: 4px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .q-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.82rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1.5px solid;
  }

  .tag-topic { color: var(--saffron); border-color: var(--saffron); background: #FFF3E8; }
  .tag-year  { color: var(--deep-maroon); border-color: var(--deep-maroon); background: #FFF0F0; }
  .tag-exam  { color: var(--green); border-color: var(--green); background: #E8F8F0; }

  .q-text {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 560px) {
    .options-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.4rem; }
    .q-text { font-size: 1.1rem; }
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 2.5px solid var(--border);
    border-radius: 12px;
    background: var(--cream);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    transition: all 0.18s;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--saffron);
    background: var(--light-gold);
    transform: translateY(-1px);
  }

  .option-label {
    min-width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--deep-maroon);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1rem;
    flex-shrink: 0;
  }

  /* Result states */
  .option-btn.correct {
    border-color: var(--green) !important;
    background: #E3F9EE !important;
  }
  .option-btn.correct .option-label { background: var(--green); }

  .option-btn.wrong {
    border-color: var(--red) !important;
    background: #FDECEA !important;
  }
  .option-btn.wrong .option-label { background: var(--red); }

  .option-btn.show-correct {
    border-color: var(--green) !important;
    background: #E3F9EE !important;
    opacity: 0.7;
  }
  .option-btn.show-correct .option-label { background: var(--green); }

  .option-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    display: none;
  }
  .feedback.correct { background: #E3F9EE; color: var(--green); border: 2px solid var(--green); display: block; }
  .feedback.wrong   { background: #FDECEA; color: var(--red);   border: 2px solid var(--red);   display: block; }

  /* PAGINATION */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 20px 16px 40px;
    flex-wrap: wrap;
  }

  .page-btn {
    padding: 8px 16px;
    border: 2.5px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text);
  }

  .page-btn:hover { border-color: var(--saffron); color: var(--saffron); }
  .page-btn.active { background: var(--deep-maroon); color: white; border-color: var(--deep-maroon); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }

  .no-questions {
    text-align: center;
    padding: 60px 20px;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--deep-maroon);
  }

  /* Decorative top strip */
  .rajasthan-strip {
    height: 8px;
    background: repeating-linear-gradient(90deg, #FF6B00 0 20%, #FFFFFF 20% 40%, #1A7A4A 40% 60%, #FFFFFF 60% 80%, #FF6B00 80% 100%);
  }
</style>
</head>
<body>

<div class="rajasthan-strip"></div>

<header>
  <h1>🏰 राजस्थान गणित प्रश्न बैंक</h1>
  <p>पिछले वर्षों के प्रश्न — REET | RPSC | Patwari | Police | SI</p>
  <div class="scorebar">
    <div class="score-badge">✅ सही: <span id="scoreCorrect">0</span></div>
    <div class="score-badge">❌ गलत: <span id="scoreWrong">0</span></div>
    <div class="score-badge">📝 कुल: <span id="scoreTotal">0</span></div>
    <div class="score-badge">🎯 प्रतिशत: <span id="scorePct">0%</span></div>
  </div>
</header>

<div class="filter-bar">
  <label>परीक्षा:</label>
  <select id="filterExam">
    <option value="">-- सभी --</option>
    <option value="REET">REET</option>
    <option value="RPSC">RPSC</option>
    <option value="Patwari">पटवारी</option>
    <option value="Police">Police</option>
    <option value="SI">SI</option>
  </select>

  <label>विषय:</label>
  <select id="filterTopic">
    <option value="">-- सभी --</option>
    <option value="संख्या पद्धति">संख्या पद्धति</option>
    <option value="प्रतिशत">प्रतिशत</option>
    <option value="लाभ-हानि">लाभ-हानि</option>
    <option value="अनुपात">अनुपात</option>
    <option value="समय-कार्य">समय-कार्य</option>
    <option value="समय-चाल">समय-चाल</option>
    <option value="साधारण ब्याज">साधारण ब्याज</option>
    <option value="चक्रवृद्धि ब्याज">चक्रवृद्धि ब्याज</option>
    <option value="औसत">औसत</option>
    <option value="बीजगणित">बीजगणित</option>
    <option value="ज्यामिति">ज्यामिति</option>
    <option value="क्षेत्रफल">क्षेत्रफल</option>
    <option value="LCM/HCF">LCM/HCF</option>
    <option value="सरलीकरण">सरलीकरण</option>
    <option value="मिश्रण">मिश्रण</option>
  </select>

  <label>वर्ष:</label>
  <select id="filterYear">
    <option value="">-- सभी --</option>
    <option value="2024">2024</option>
    <option value="2023">2023</option>
    <option value="2022">2022</option>
    <option value="2021">2021</option>
    <option value="2020">2020</option>
    <option value="2019">2019</option>
    <option value="2018">2018</option>
  </select>

  <input type="text" id="searchBox" placeholder="🔍 प्रश्न खोजें..." style="min-width:180px;">
  <button class="btn-reset" onclick="resetScore()">स्कोर रीसेट</button>
</div>

<div class="progress-section">
  <div class="progress-info">
    <span id="progressText">प्रश्न देख रहे हैं: 0 / 0</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="questions-container" id="questionsContainer"></div>
<div class="pagination" id="pagination"></div>

<script>
// ===================== QUESTION BANK (1000 questions) =====================
// Topics: संख्या पद्धति, प्रतिशत, लाभ-हानि, अनुपात, समय-कार्य,

  {t:"संख्या पद्धति", q:"1 से 100 तक सम संख्याओं का योग क्या है?", o:["2500","2550","2600","2450"], a:1, exam:"RPSC", yr:"2023"},

  {t:"संख्या पद्धति", q:"875 को 25 से भाग देने पर भागफल होगा?", o:["35","34","36","33"], a:0, exam:"Police", yr:"2020"},

  {t:"संख्या पद्धति", q:"एक संख्या का तीन गुना 210 है, संख्या क्या है?", o:["60","70","80","90"], a:1, exam:"RPSC", yr:"2022"},
  {t:"संख्या पद्धति", q:"987 + 654 + 321 = ?", o:["1962","1872","1962","1952"], a:0, exam:"Patwari", yr:"2022"},
  {t:"संख्या पद्धति", q:"3 अंकों की सबसे छोटी विषम संख्या कौनसी है?", o:["101","103","100","102"], a:0, exam:"Police", yr:"2021"},
  {t:"संख्या पद्धति", q:"2³ × 2⁴ = ?", o:["2⁷","2¹²","4⁷","2⁶"], a:0, exam:"SI", yr:"2023"},

  {t:"प्रतिशत", q:"600 का 15% कितना होगा?", o:["90","80","100","85"], a:0, exam:"REET", yr:"2022"},
  {t:"प्रतिशत", q:"यदि 80 का x% = 20, तो x = ?", o:["20","25","30","15"], a:1, exam:"RPSC", yr:"2021"},
  {t:"प्रतिशत", q:"एक परीक्षा में 450 में से 360 अंक आए, प्रतिशत क्या है?", o:["78%","80%","82%","84%"], a:1, exam:"Patwari", yr:"2023"},
  {t:"प्रतिशत", q:"1200 का 12.5% कितना होगा?", o:["150","140","160","130"], a:0, exam:"Police", yr:"2022"},

    {t:"मिश्रण",q:"दो मिश्र धातुओं में तांबा:जिंक 5:3 व 2:1 है, बराबर मिलाने पर?",o:["11:7","7:5","10:6","8:4"],a:0,exam:"Police",yr:"2021"},
    {t:"मिश्रण",q:"50 ली. दूध+पानी में 20% पानी, और पानी मिलाकर 25% करना, मिलाएँ?",o:["10/3 ली.","5 ली.","4 ली.","3 ली."],a:0,exam:"SI",yr:"2023"},

    // More बीजगणित
    {t:"बीजगणित",q:"a+b=5, ab=6 तो a²+b² = ?",o:["13","11","15","10"],a:0,exam:"REET",yr:"2021"},
    {t:"बीजगणित",q:"x²-5x+6=0 के हल = ?",o:["2,3","1,6","2,4","3,4"],a:0,exam:"RPSC",yr:"2023"},
    {t:"बीजगणित",q:"(a-b)² = a²-2ab+b², a=5,b=3 रखने पर = ?",o:["4","8","16","2"],a:0,exam:"Patwari",yr:"2022"},
    {t:"बीजगणित",q:"5x = 2y, x:y = ?",o:["2:5","5:2","1:2","2:1"],a:0,exam:"Police",yr:"2021"},
    {t:"बीजगणित",q:"यदि x+y=10, xy=21, x-y = ?",o:["4","6","2","8"],a:0,exam:"SI",yr:"2023"},

    // More ज्यामिति
    {t:"ज्यामिति",q:"किसी बहुभुज के कोणों का योग 1080° है, भुजाओं की संख्या = ?",o:["8","7","9","10"],a:0,exam:"REET",yr:"2021"},
    {t:"ज्यामिति",q:"एक वृत्त का क्षेत्रफल π = 616 cm², त्रिज्या = ?",o:["14 cm","12 cm","16 cm","10 cm"],a:0,exam:"RPSC",yr:"2023"},
    {t:"ज्यामिति",q:"चतुर्भुज के कोणों का योग = ?",o:["360°","180°","270°","540°"],a:0,exam:"Patwari",yr:"2022"},
    {t:"ज्यामिति",q:"समबाहु त्रिभुज का प्रत्येक कोण = ?",o:["60°","45°","90°","30°"],a:0,exam:"Police",yr:"2021"},
    {t:"ज्यामिति",q:"एक त्रिभुज के कोण 3:4:5 में, सबसे बड़ा कोण = ?",o:["75°","60°","90°","80°"],a:0,exam:"SI",yr:"2023"},

    // More क्षेत्रफल
    {t:"क्षेत्रफल",q:"1 हेक्टेयर = कितने m²?",o:["10000","1000","100000","100"],a:0,exam:"REET",yr:"2021"},
    {t:"क्षेत्रफल",q:"एक घनाभ l=5,b=3,h=2 का आयतन = ?",o:["30 cm³","25 cm³","35 cm³","20 cm³"],a:0,exam:"RPSC",yr:"2023"},
    {t:"क्षेत्रफल",q:"21 cm त्रिज्या गोले का पृष्ठ क्षेत्रफल (π=22/7) = ?",o:["5544 cm²","4400 cm²","6600 cm²","7700 cm²"],a:0,exam:"Patwari",yr:"2022"},
    {t:"क्षेत्रफल",q:"वर्ग की भुजा 2 गुनी होने पर क्षेत्रफल कितना हो जाएगा?",o:["4 गुना","2 गुना","8 गुना","3 गुना"],a:0,exam:"Police",yr:"2021"},
    {t:"क्षेत्रफल",q:"42 cm परिधि वाले वृत्त का क्षेत्रफल (π=22/7) = ?",o:["441/π cm²","441 cm²","441π cm²","882 cm²"],a:0,exam:"SI",yr:"2023"},
  ];

  extras.forEach(q => all.push({...q}));

  // Fill remaining to 1000 by cycling through templates with varied years
  const years = ["2018","2019","2020","2021","2022","2023","2024"];
  let i = 0;
  while (all.length < 1000) {
    const base = TEMPLATE[i % TEMPLATE.length];
    const yr = years[Math.floor(all.length / 150) % years.length];
    const exam = ["REET","RPSC","Patwari","Police","SI"][all.length % 5];
    all.push({ ...base, yr, exam, _dup: true });
    i++;
  }

  return all.slice(0, 1000).map((q, idx) => ({ ...q, id: idx + 1 }));
}

const ALL_QUESTIONS = generateAllQuestions();

// ===================== STATE =====================
let score = { correct: 0, wrong: 0, total: 0 };
let answered = {}; // id -> {selected, correct}
let currentPage = 1;
const PAGE_SIZE = 10;

// ===================== FILTER =====================
function getFiltered() {
  const exam = document.getElementById('filterExam').value;
  const topic = document.getElementById('filterTopic').value;
  const year = document.getElementById('filterYear').value;
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  return ALL_QUESTIONS.filter(q => {
    if (exam && q.exam !== exam) return false;
    if (topic && q.t !== topic) return false;
    if (year && q.yr !== year) return false;
    if (search && !q.q.toLowerCase().includes(search)) return false;
    return true;
  });
}

// ===================== RENDER =====================
function render() {
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageQs = filtered.slice(start, start + PAGE_SIZE);

  // Progress
  const answeredCount = filtered.filter(q => answered[q.id]).length;
  const pct = filtered.length ? Math.round(answeredCount / filtered.length * 100) : 0;
  document.getElementById('progressText').textContent = `प्रश्न हल किए: ${answeredCount} / ${filtered.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  // Score
  document.getElementById('scoreCorrect').textContent = score.correct;
  document.getElementById('scoreWrong').textContent = score.wrong;
  document.getElementById('scoreTotal').textContent = score.total;
  document.getElementById('scorePct').textContent = score.total ? Math.round(score.correct / score.total * 100) + '%' : '0%';

  // Questions
  const container = document.getElementById('questionsContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-questions">🔍 कोई प्रश्न नहीं मिला। फ़िल्टर बदलें।</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  container.innerHTML = pageQs.map((q, i) => {
    const ans = answered[q.id];
    const labels = ['अ','ब','स','द'];
    const optionsHtml = q.o.map((opt, oi) => {
      let cls = '';
      let disabled = '';
      if (ans !== undefined) {
        disabled = 'disabled';
        if (oi === q.a) cls = ans.selected === oi ? 'correct' : 'show-correct';
        else if (oi === ans.selected && ans.selected !== q.a) cls = 'wrong';
      }
      return `<button class="option-btn ${cls}" ${disabled} onclick="selectAnswer(${q.id}, ${oi}, ${q.a})">
        <span class="option-label">${labels[oi]}</span>
        <span>${opt}</span>
      </button>`;
    }).join('');

    let feedback = '';
    if (ans !== undefined) {
      if (ans.correct) {
        feedback = `<div class="feedback correct">✅ शाबाश! सही जवाब है।</div>`;
      } else {
        feedback = `<div class="feedback wrong">❌ गलत। सही उत्तर: <strong>${q.o[q.a]}</strong></div>`;
      }
    }

    return `<div class="q-card" id="qcard-${q.id}">
      <div class="q-header">
        <span class="q-number">प्र. ${start + i + 1}</span>
        <div class="q-tags">
          <span class="tag tag-topic">${q.t}</span>
          <span class="tag tag-exam">${q.exam}</span>
          <span class="tag tag-year">${q.yr}</span>
        </div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-grid">${optionsHtml}</div>
      ${feedback}
    </div>`;
  }).join('');

  // Pagination
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀ पहले</button>`;

  const range = 2;
  let pages = new Set([1, totalPages]);
  for (let p = Math.max(1, currentPage-range); p <= Math.min(totalPages, currentPage+range); p++) pages.add(p);
  const sorted = [...pages].sort((a,b)=>a-b);

  let prev = 0;
  sorted.forEach(p => {
    if (p - prev > 1) html += `<span class="page-btn" style="cursor:default">…</span>`;
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>अगले ▶</button>`;
  pag.innerHTML = html;
}

function goPage(p) {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  window.scrollTo({top: 0, behavior:'smooth'});
  render();
}

// ===================== ANSWER =====================
function selectAnswer(id, selected, correct) {
  if (answered[id] !== undefined) return;
  const isCorrect = selected === correct;
  answered[id] = { selected, correct: isCorrect };
  score.total++;
  if (isCorrect) score.correct++;
  else score.wrong++;
  render();
}

function resetScore() {
  if (!confirm('क्या आप स्कोर रीसेट करना चाहते हैं?')) return;
  score = { correct: 0, wrong: 0, total: 0 };
  answered = {};
  render();
}

// ===================== EVENTS =====================
['filterExam','filterTopic','filterYear'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => { currentPage = 1; render(); });
});
document.getElementById('searchBox').addEventListener('input', () => { currentPage = 1; render(); });

// ===================== INIT =====================
render();
</script>
